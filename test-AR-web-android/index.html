<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gourmet 3D Menu | V1.9 Solid Mode</title>
    <!-- Cache Buster on JS and CSS -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="app.js?v=1.9"></script>
    <link rel="stylesheet" href="styles.css?v=1.9" />
</head>
<body>
    <!-- Version Marker -->
    <div style="position: fixed; top: 5px; right: 5px; z-index: 10001; color: white; background: rgba(0,0,0,0.5); padding: 5px; font-size: 10px; pointer-events: none;">
        V1.9 SOLID MODE (NO IMAGES)
    </div>

    <!-- Custom Loader Overlay -->
    <div id="custom-loader">
        <h1>GOURMET 3D MENU</h1>
        <div class="spinner"></div>
        <button id="force-start" style="display: none; margin-top: 20px; padding: 10px 20px; background: #e6bc7c; border: none; border-radius: 5px; color: #1a0a00; font-weight: 800; cursor: pointer;">ENTER RESTAURANT</button>
    </div>

    <script>
        (function() {
            var loader = document.getElementById('custom-loader');
            var forceBtn = document.getElementById('force-start');
            
            function hideLoader() {
                if (loader && !loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    setTimeout(function() { loader.style.display = 'none'; }, 600);
                }
            }

            // Show enter button fast
            setTimeout(function() {
                if (forceBtn) forceBtn.style.display = 'block';
            }, 3000);

            if (forceBtn) forceBtn.onclick = hideLoader;

            window.addEventListener('load', function() {
                var scene = document.querySelector('a-scene');
                if (scene) {
                    if (scene.hasLoaded) { hideLoader(); }
                    else { scene.addEventListener('loaded', hideLoader); }
                }
                setTimeout(hideLoader, 6000); // 6s fail-safe for solid mode
            });
        })();
    </script>

    <a-scene 
        loading-screen="enabled: false"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; antialias: true">
        
        <!-- Background (Warm ambient color instead of photo) -->
        <a-sky color="#2c1b0e"></a-sky>

        <a-light type="ambient" color="#fff" intensity="0.9"></a-light>
        <a-light type="point" color="#ffedd6" intensity="0.8" position="0 3 0"></a-light>

        <a-entity id="rig" position="0 1.6 1.2">
            <a-camera look-controls="pointerLockEnabled: false" wasd-controls="enabled: false"></a-camera>
        </a-entity>

        <!-- No a-assets used to avoid loading hangs -->

        <!-- Solid Color Table (Height 0.75m) -->
        <a-entity id="table-group" position="0 0 -0.8">
            <!-- Table Top -->
            <a-box id="table-top" 
                position="0 0.73 0" 
                width="1.8" height="0.06" depth="1.2" 
                color="#5d4037" 
                shadow="receive: true; cast: true"></a-box>
            
            <!-- Table Legs -->
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="-0.8 0.35 -0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="0.8 0.35 -0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="-0.8 0.35 0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="0.8 0.35 0.5"></a-cylinder>
        </a-entity>

        <!-- Menu Stand -->
        <a-entity position="0 1.35 -1.6" rotation="-10 0 0">
            <a-plane material="color: #1a0a00; opacity: 0.95" width="1.6" height="0.9"></a-plane>
            <a-text value="SELECT YOUR DISH" align="center" color="#e6bc7c" position="0 0.35 0.01" width="3.5"></a-text>

            <!-- Menu Buttons (Solid Colors) -->
            <a-entity position="-0.4 0.1 0.02" class="clickable" 
                geometry="primitive: box; width: 0.4; height: 0.15; depth: 0.05" 
                material="color: #4CAF50"
                menu-button="target: #item-pizza">
                <a-text value="PIZZA" align="center" color="#ffffff" width="1.8" zOffset="0.03"></a-text>
            </a-entity>

            <a-entity position="0.4 0.1 0.02" class="clickable" 
                geometry="primitive: box; width: 0.4; height: 0.15; depth: 0.05" 
                material="color: #4CAF50"
                menu-button="target: #item-burger">
                <a-text value="BURGER" align="center" color="#ffffff" width="1.8" zOffset="0.03"></a-text>
            </a-entity>

            <a-entity position="-0.4 -0.15 0.02" class="clickable" 
                geometry="primitive: box; width: 0.4; height: 0.15; depth: 0.05" 
                material="color: #4CAF50"
                menu-button="target: #item-pasta">
                <a-text value="PASTA" align="center" color="#ffffff" width="1.8" zOffset="0.03"></a-text>
            </a-entity>

            <a-entity position="0.4 -0.15 0.02" class="clickable" 
                geometry="primitive: box; width: 0.4; height: 0.15; depth: 0.05" 
                material="color: #4CAF50"
                menu-button="target: #item-soda">
                <a-text value="DRINK" align="center" color="#ffffff" width="1.8" zOffset="0.03"></a-text>
            </a-entity>
        </a-entity>

        <!-- Showcase Area (Solid Color Food) -->
        <a-entity id="food-showcase" position="0 0.76 -0.8">
            <a-text id="prompt-text" value="Select an item" align="center" color="#ffffff" position="0 0.4 0" width="2.5"></a-text>

            <!-- Pizza (Yellow Circle) -->
            <a-entity id="item-pizza" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-cylinder color="#f0d060" radius="0.25" height="0.025" position="0 0.02 0"></a-cylinder>
            </a-entity>

            <!-- Burger (Brown/Tan Layers) -->
            <a-entity id="item-burger" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-cylinder color="#f4a460" radius="0.09" height="0.03" position="0 0.03 0"></a-cylinder>
                <a-cylinder color="#3a2010" radius="0.095" height="0.025" position="0 0.055 0"></a-cylinder>
                <a-sphere color="#f4a460" radius="0.09" position="0 0.08 0" phi-length="360" theta-length="90"></a-sphere>
            </a-entity>

            <!-- Pasta (White/Tan) -->
            <a-entity id="item-pasta" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-cylinder color="#ffffff" radius="0.18" height="0.08" position="0 0.05 0" open-ended="true" side="double"></a-cylinder>
                <a-torus-knot color="#f3e5ab" radius="0.08" tube="0.03" position="0 0.07 0" rotation="90 0 0"></a-torus-knot>
            </a-entity>

            <!-- Drink (Red/Black) -->
            <a-entity id="item-soda" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-cylinder color="#ffffff" radius="0.06" height="0.22" position="0 0.12 0" material="opacity: 0.3; transparent: true"></a-cylinder>
                <a-cylinder color="#1a0a00" radius="0.055" height="0.18" position="0 0.1 0"></a-cylinder>
            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
