<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gourmet 3D Experience | Android</title>
    <!-- A-Frame Library (Updated to 1.6.0 for better mobile support) -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Custom Loader Overlay -->
    <div id="custom-loader">
        <h1>GOURMET 3D MENU</h1>
        <div class="spinner"></div>
        <button id="force-start" style="display: none; margin-top: 20px; padding: 10px 20px; background: #e6bc7c; border: none; border-radius: 5px; color: #1a0a00; font-weight: 800; cursor: pointer;">FORCE START</button>
    </div>

    <!-- Inline script to ensure loader hides even if app.js has errors -->
    <script>
        (function() {
            var loader = document.getElementById('custom-loader');
            var forceBtn = document.getElementById('force-start');
            
            function hideLoader() {
                if (loader && !loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    setTimeout(function() { loader.style.display = 'none'; }, 600);
                }
            }

            // Show force button after 10 seconds
            setTimeout(function() {
                if (forceBtn) forceBtn.style.display = 'block';
            }, 10000);

            if (forceBtn) forceBtn.onclick = hideLoader;

            // Simple check for A-Frame
            window.addEventListener('load', function() {
                var scene = document.querySelector('a-scene');
                if (scene) {
                    if (scene.hasLoaded) { hideLoader(); }
                    else { scene.addEventListener('loaded', hideLoader); }
                }
                // Backup window load exit
                setTimeout(hideLoader, 12000);
            });
        })();
    </script>

    <!-- A-Frame Scene -->
    <a-scene 
        loading-screen="enabled: false" 
        renderer="colorManagement: true; antialias: true; logarithmicDepthBuffer: true"
        cursor="rayOrigin: mouse" 
        raycaster="objects: .clickable">
        
        <!-- Assets Management -->
        <a-assets timeout="10000">
            <img id="bg-texture" src="assets/new_restaurant_360.png" crossorigin="anonymous">
            <img id="wood-texture" src="assets/wood_texture_1775491554521.png" crossorigin="anonymous">
            <img id="pizza-texture" src="assets/pizza_texture_1775491638742.png" crossorigin="anonymous">
            <img id="bun-texture" src="assets/bun_texture_1775491745871.png" crossorigin="anonymous">
            
            <!-- Shared Mixins -->
            <mixin id="btn-mixin" 
                geometry="primitive: box; width: 0.4; height: 0.15; depth: 0.05" 
                material="color: #4CAF50; roughness: 0.6; metalness: 0.2" 
                shadow="cast: true"></mixin>
            
            <mixin id="text-mixin" 
                text="align: center; color: #ffffff; width: 1.8; zOffset: 0.03"></mixin>
            
            <mixin id="plate-mixin" 
                geometry="primitive: cylinder; radius: 0.28; height: 0.02" 
                material="color: #f0f0f0; roughness: 0.1; metalness: 0.2" 
                shadow="receive: true; cast: true"></mixin>
        </a-assets>

        <!-- Immersive 360 Environment -->
        <a-sky src="#bg-texture" rotation="0 -90 0"></a-sky>

        <!-- Dynamic Lighting -->
        <a-light type="ambient" color="#fff" intensity="0.7"></a-light>
        <a-light type="directional" color="#fff" intensity="0.8" position="-1 4 2" castShadow="true"></a-light>
        <a-light type="point" color="#ffedd6" intensity="0.6" position="0 2 -1"></a-light>

        <!-- Camera Rig -->
        <a-entity id="rig" position="0 1.6 1.2">
            <a-camera look-controls="pointerLockEnabled: false" wasd-controls="enabled: false">
            </a-camera>
        </a-entity>

        <!-- Premium Wooden Table (Height 0.75m) -->
        <a-entity id="table-group" position="0 0 -0.8">
            <!-- Table Top -->
            <a-box id="table-top" 
                position="0 0.73 0" 
                width="1.8" height="0.06" depth="1.2" 
                material="src: #wood-texture; roughness: 0.8; repeat: 2 1.5" 
                shadow="receive: true; cast: true"></a-box>
            
            <!-- Table Legs (Simplified for performance) -->
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="-0.8 0.35 -0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="0.8 0.35 -0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="-0.8 0.35 0.5"></a-cylinder>
            <a-cylinder color="#382512" radius="0.04" height="0.7" position="0.8 0.35 0.5"></a-cylinder>
        </a-entity>

        <!-- Floating Interactive Menu Stand -->
        <a-entity position="0 1.35 -1.6" rotation="-10 0 0">
            <!-- Background Panel -->
            <a-plane material="color: #1a0a00; opacity: 0.95; roughness: 1" width="1.6" height="0.9"></a-plane>
            <a-text value="GOURMET 3D MENU" align="center" color="#e6bc7c" position="0 0.35 0.01" width="3.5"></a-text>

            <!-- Menu Buttons Grid -->
            <a-entity position="-0.4 0.1 0.02" class="clickable" mixin="btn-mixin" menu-button="target: #item-pizza">
                <a-text mixin="text-mixin" value="PIZZA"></a-text>
            </a-entity>
            <a-entity position="0.4 0.1 0.02" class="clickable" mixin="btn-mixin" menu-button="target: #item-burger">
                <a-text mixin="text-mixin" value="BURGER"></a-text>
            </a-entity>
            <a-entity position="-0.4 -0.15 0.02" class="clickable" mixin="btn-mixin" menu-button="target: #item-pasta">
                <a-text mixin="text-mixin" value="PASTA"></a-text>
            </a-entity>
            <a-entity position="0.4 -0.15 0.02" class="clickable" mixin="btn-mixin" menu-button="target: #item-soda">
                <a-text mixin="text-mixin" value="DRINK"></a-text>
            </a-entity>
        </a-entity>

        <!-- Food Showcase Area (Centered on Table) -->
        <a-entity id="food-showcase" position="0 0.76 -0.8">
            
            <!-- Selection Prompt -->
            <a-text id="prompt-text" value="Select a dish to see it on the table" align="center" color="#ffffff" position="0 0.4 0" width="2.5"></a-text>

            <!-- Deluxe Pizza -->
            <a-entity id="item-pizza" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-entity mixin="plate-mixin"></a-entity>
                <a-cylinder src="#pizza-texture" radius="0.25" height="0.025" position="0 0.02 0" material="roughness: 0.7"></a-cylinder>
            </a-entity>

            <!-- Gourmet Burger -->
            <a-entity id="item-burger" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-entity mixin="plate-mixin"></a-entity>
                <!-- Bottom Bun -->
                <a-cylinder src="#bun-texture" radius="0.09" height="0.03" position="0 0.03 0" material="color: #f4a460"></a-cylinder>
                <!-- Patty -->
                <a-cylinder color="#3a2010" radius="0.095" height="0.025" position="0 0.055 0"></a-cylinder>
                <!-- Top Bun -->
                <a-sphere src="#bun-texture" radius="0.09" position="0 0.08 0" phi-length="360" theta-length="90" material="color: #f4a460"></a-sphere>
            </a-entity>

            <!-- Creamy Pasta -->
            <a-entity id="item-pasta" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-entity mixin="plate-mixin"></a-entity>
                <a-cylinder color="#ffffff" radius="0.18" height="0.08" position="0 0.05 0" open-ended="true" side="double"></a-cylinder>
                <a-torus-knot color="#f3e5ab" radius="0.08" tube="0.03" position="0 0.07 0" rotation="90 0 0"></a-torus-knot>
            </a-entity>

            <!-- Refreshing Drink -->
            <a-entity id="item-soda" visible="false" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                <a-entity mixin="plate-mixin" geometry="radius: 0.15"></a-entity>
                <a-cylinder color="#ffffff" radius="0.06" height="0.22" position="0 0.12 0" material="opacity: 0.3; transparent: true"></a-cylinder>
                <a-cylinder color="#1a0a00" radius="0.055" height="0.18" position="0 0.1 0" material="opacity: 0.8; transparent: true"></a-cylinder>
                <a-cylinder color="#ff0000" radius="0.005" height="0.25" position="0.02 0.14 0" rotation="0 0 10"></a-cylinder>
            </a-entity>
        </a-entity>

    </a-scene>
</body>
</html>
