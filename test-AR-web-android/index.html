<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gourmet 3D Experience | Android</title>
    <!-- A-Frame Library (Switching to 1.4.2 for maximum mobile stability) -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="app.js"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- On-screen Debug Console -->
    <div id="debug-log" style="position: fixed; top: 10px; left: 10px; z-index: 10000; background: rgba(0,0,0,0.8); color: lime; padding: 10px; font-family: monospace; font-size: 12px; pointer-events: none; border: 1px solid lime; border-radius: 5px;">
        STATUS: INITIALIZING...
    </div>

    <!-- Custom Loader Overlay -->
    <div id="custom-loader">
        <h1>GOURMET 3D MENU</h1>
        <div class="spinner"></div>
        <button id="force-start" style="display: none; margin-top: 20px; padding: 10px 20px; background: #e6bc7c; border: none; border-radius: 5px; color: #1a0a00; font-weight: 800; cursor: pointer;">FORCE START</button>
    </div>

    <!-- Inline script to ensure loader hides and debug log updates -->
    <script>
        (function() {
            var loader = document.getElementById('custom-loader');
            var forceBtn = document.getElementById('force-start');
            var log = document.getElementById('debug-log');
            
            function updateLog(msg) {
                if (log) log.innerHTML = "STATUS: " + msg;
                console.log("LOG: " + msg);
            }

            function hideLoader() {
                if (loader && !loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    setTimeout(function() { loader.style.display = 'none'; }, 600);
                    updateLog("VISIBLE: BLUE SKY?");
                }
            }

            // WebGL Check
            function checkWebGL() {
                try {
                    var canvas = document.createElement('canvas');
                    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                    return !!gl;
                } catch(e) { return false; }
            }

            // Show force button after 5 seconds
            setTimeout(function() {
                if (forceBtn) forceBtn.style.display = 'block';
            }, 5000);

            if (forceBtn) forceBtn.onclick = function() {
                updateLog("FORCE STARTED");
                hideLoader();
            };

            window.addEventListener('load', function() {
                updateLog("PAGE LOADED");
                
                if (!checkWebGL()) {
                    updateLog("ERR: NO WEBGL");
                    return;
                }

                var scene = document.querySelector('a-scene');
                if (scene) {
                    updateLog("SCENE FOUND");
                    if (scene.hasLoaded) { 
                        updateLog("READY (AUTO)");
                        hideLoader(); 
                    } else { 
                        scene.addEventListener('loaded', function() {
                            updateLog("READY (EVENT)");
                            hideLoader();
                        });
                    }
                } else {
                    updateLog("ERR: NO SCENE");
                }
                
                // Final fail-safe
                setTimeout(function() {
                    updateLog("TIMEOUT EXIT");
                    hideLoader();
                }, 10000);
            });

            window.onerror = function(msg) {
                updateLog("JS ERR: " + msg);
            };
        })();
    </script>

    <!-- Atomic Minimum Scene (Now with Blue Sky) -->
    <a-scene 
        loading-screen="enabled: false"
        vr-mode-ui="enabled: false">
        
        <!-- Bright Blue Sky (If you see blue, A-Frame is WORKING) -->
        <a-sky color="#87CEEB"></a-sky>
        
        <!-- White Box right in front of the camera (position at z=-1) -->
        <a-box position="0 1.6 -1" color="white" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
        
        <!-- Constant Lighting -->
        <a-light type="ambient" color="#ffffff"></a-light>
        <a-light type="point" intensity="1" position="1 2 1"></a-light>
        
    </a-scene>
</body>
</html>
